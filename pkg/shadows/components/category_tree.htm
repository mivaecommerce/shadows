<Module code="cmp-cssui-cattree" feature="component"><Header_Update><Template/><Notes>#Set_Current_Time#</Notes></Header_Update><Footer_Update><Template/><Notes>#Set_Current_Time#</Notes></Footer_Update><Cattree_Update><Template><![CDATA[<nav class="x-category-tree" aria-labelledby="categoryTree-label">
	<div class="x-category-tree__title">
		<p id="categoryTree-label" class="x-category-tree__heading mm-theme-typography-title-four">Categories</p>
	</div>
	<ul id="categoryTree" class="x-category-tree__row">
		<mvt:foreach array="cattree_categories" iterator="cattree_category">
			<li class="x-category-tree__list x-category-tree__list--level-&mvte:cattree_category:level;">
				<mvt:if expr="NOT ISNULL l.settings:category:id AND l.settings:category:id EQ l.settings:cattree_category:id AND l.settings:page:code NE 'CTLG'">
					<a class="x-category-tree__link mm-theme-button-secondary-navigation mm-theme-button-secondary-navigation__medium x-category-tree__link--current " href="&mvte:cattree_category:link;">&mvt:cattree_category:name;</a>
				<mvt:elseif expr="NOT ISNULL g.Category_Code AND ISNULL l.settings:category:id AND l.settings:cattree_category:code EQ g.Category_Code AND l.settings:page:code NE 'CTLG'">
					<a class="x-category-tree__link mm-theme-button-secondary-navigation mm-theme-button-secondary-navigation__medium x-category-tree__link--current " href="&mvte:cattree_category:link;">&mvt:cattree_category:name;</a>
				<mvt:else>
					<a class="x-category-tree__link mm-theme-button-secondary-navigation mm-theme-button-secondary-navigation__medium" href="&mvte:cattree_category:link;">&mvt:cattree_category:name;</a>
				</mvt:if>
			</li>
		</mvt:foreach>
	</ul>
</nav>
<!-- end .x-category-tree -->
]]></Template><Notes>#Set_Current_Time#</Notes></Cattree_Update><Fields/></Module>
